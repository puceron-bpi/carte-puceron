<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carte interactive des sites de collecte de pucerons</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { width: 50%; height: 100vh; float: left; position: relative; }
    .leaflet-container { background: white !important; }
    #chart-container { width: 50%; height: 100vh; float: left; display: flex; flex-direction: column; }
    #chart { flex: 1; }
    #reset-button { padding: 10px; border: none; background-color: #333; color: white; cursor: pointer; font-size: 1rem; }
    #reset-button:hover { background-color: #555; }

    #legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: white;
      border-radius: 8px;
      padding: 10px 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 0.95rem;
      z-index: 1000;
      max-width: 300px;
    }
    #legend h4 { margin: 0 0 8px; font-size: 1rem; }
    .legend-border, .legend-center {
      display: inline-block; width: 16px; height: 16px;
      margin-right: 8px; vertical-align: middle; border-radius: 50%;
    }
    .legend-border { background: white; border: 3px solid #e41a1c; }
    .legend-center { background: #e41a1c; border: 2px solid black; }
    .legend-note { font-size: 0.85em; color: #555; margin-top: 10px; }

    /* Logo contrôle Leaflet — fond totalement transparent */
    .leaflet-control-logo {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 10px 10px 0 !important;
    }
    .leaflet-control-logo img {
      height: 56px;
      display: block;
      background: transparent;
    }

    #chart-header {
      padding: 8px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
      font-weight: bold;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="map">
    <div id="legend">
      <h4>Légende</h4>
      <p><span class="legend-border"></span> Couleur du site (correspond à la courbe)</p>
      <p><span class="legend-center"></span> Centre coloré : taux estimé de <em>Myzus</em> (%)</p>
      <p style="font-size: 0.9em; margin-top: 8px;">Survolez un point pour voir la date et le taux</p>
      <p class="legend-note">⚠️ Le taux de <em>Myzus</em> est estimé sur un échantillon de 20 pucerons capturés par site.</p>
    </div>
  </div>

  <div id="chart-container">
    <div id="chart-header">📊 Données captures pucerons 2026</div>
    <div id="chart"></div>
    <button id="reset-button" onclick="resetZoom()">Afficher toutes les données</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="sites_data.js"></script>
  <script src="https://cdn.plot.ly/plotly-locale-fr-latest.js"></script>

  <script>
    const moisFR = ['janvier','février','mars','avril','mai','juin',
                    'juillet','août','septembre','octobre','novembre','décembre'];

    function formatDateFR(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return `${d.getDate()} ${moisFR[d.getMonth()]}`;
    }

    const sitesActifs = sites.filter(s => s.data && s.data.length > 0);

    const map = L.map('map').setView([48.0, -3.5], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // ── Logo comme contrôle Leaflet natif ──
    const LogoControl = L.Control.extend({
      options: { position: 'bottomright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'leaflet-control-logo');
        const img = L.DomUtil.create('img', '', div);
        img.src = 'logo.png';   // fichier dans le même dossier
        img.alt = 'Bretagne Plants Innovation';
        return div;
      }
    });
    new LogoControl().addTo(map);

    sitesActifs.forEach((site, idx) => {
      const marker = L.circleMarker(site.coords, {
        color: site.color,
        radius: 8,
        fillOpacity: 0.8,
        fillColor: site.myzusColor || 'white'
      }).addTo(map);

      const lastData = site.data[site.data.length - 1];
      let tt = `<strong>${site.name}</strong><br>`;
      if (site.myzusDate && site.myzusTaux !== null && site.myzusTaux !== undefined) {
        tt += `Date Myzus : ${site.myzusDate}<br>Taux Myzus : ${site.myzusTaux}%<br>`;
      } else {
        tt += `Aucune donnée Myzus récente<br>`;
      }
      if (lastData) {
        tt += `Dernière donnée : ${lastData.count} pucerons/jour (${formatDateFR(lastData.date)})`;
      }

      marker.bindTooltip(tt);
      marker.on('mouseover', () => highlightTrace(idx));
      marker.on('mouseout', () => resetTraces());
    });

    const traces = sitesActifs.map(site => ({
  x: site.data.map(d => d.date),
  y: site.data.map(d => Number(d.count)),
  name: site.name,
  mode: site.data.length === 1 ? 'markers' : 'lines+markers',
  connectgaps: true,
  line: {
    color: site.color,
    width: 2
  },
  marker: {
    size: site.data.length === 1 ? 10 : 6,
    color: site.color
  }
}));

    const allDates = sitesActifs.flatMap(site => site.data.map(d => new Date(d.date)));
    const maxDate = new Date(Math.max(...allDates));
    const minDate = new Date(Math.min(...allDates));
    const initialStartDate = new Date(maxDate);
    initialStartDate.setDate(maxDate.getDate() - 7);

    Plotly.setPlotConfig({ locale: 'fr' });
    Plotly.newPlot('chart', traces, {
      margin: { t: 10, r: 20, b: 60, l: 55 },
      xaxis: {
        title: 'Date',
        type: 'date',
        range: [initialStartDate.toISOString(), maxDate.toISOString()],
        tickformat: '%d/%m',
        dtick: 86400000,
        rangeslider: { visible: true, yaxis: { visible: false }, tickformat: '%d/%m' }
      },
      yaxis: { title: 'Nombre de pucerons', autorange: true }
    });

    function resetZoom() {
      Plotly.relayout('chart', {
        'xaxis.range': [minDate.toISOString(), maxDate.toISOString()],
        'xaxis.dtick': 86400000,
        'xaxis.tickformat': '%d/%m'
      });
    }

    function highlightTrace(index) {
      Plotly.restyle('chart', {
        'line.width': sitesActifs.map((_, i) => i === index ? 4 : 1),
        'opacity': sitesActifs.map((_, i) => i === index ? 1 : 0.2)
      });
    }

    function restraces() {
      Plotly.restyle('chart', {
        'line.width': sitesActifs.map(() => 2),
        'opacity': sitesActifs.map(() => 1)
      });
    }

    function resetTraces() {
      Plotly.restyle('chart', {
        'line.width': sitesActifs.map(() => 2),
        'opacity': sitesActifs.map(() => 1)
      });
    }
  </script>
</body>
</html>
